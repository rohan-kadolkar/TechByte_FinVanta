<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow - Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="login-container">
        <div class="login-card welcome-card">
            
            <div class="illustration-container">
                <img src="{{ url_for('static', filename='illustrations.png') }}" alt="Financial Growth" class="welcome-img">
            </div>

            <h2 class="welcome-title">Welcome to FinanceFlow!</h2>
            <p class="welcome-text">Let's get your financial journey started. Connect your bank accounts to see your full financial picture.</p>
            
            <a href="{{ url_for('connect_bank') }}" class="login-btn connect-btn" style="text-decoration: none; display: block; text-align: center; box-sizing: border-box;">
                Connect Your Accounts
            </a>

            <div class="skip-link">
                <a href="{{ url_for('dashboard') }}">Skip for now</a>
            </div>

        </div>
    </div>

</body>
</html>
