<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow - Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="login-container">
        <div class="login-card">
            
            <div class="logo-section">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <h1 class="logo-text">FinanceFlow</h1>
            </div>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/signup">
                <div class="form-group">
                    <input type="text" name="fullname" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <input type="tel" name="mobilenumber" placeholder="Mobile Number" pattern="[0-9]{10}" title="Ten digit mobile number" required>
                </div>
                
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to the <a href="#" class="forgot-pass">Terms & Privacy</a>
                    </label>
                </div>

                <button type="submit" class="login-btn">Create Account</button>
            </form>

            <div class="signup-link">
                Already have an account? <a href="{{ url_for('login') }}">Log in</a>
            </div>

        </div>
    </div>

</body>
</html>
