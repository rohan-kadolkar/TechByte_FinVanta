<div class="chat-fab" onclick="toggleChat()">
    <i class="fa-solid fa-sparkles"></i> Ask AI
</div>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <div>
            <h4 style="margin: 0; color: white;"><i class="fa-solid fa-robot"></i> Setu-AI</h4>
            <span style="font-size: 11px; color: #a5b4fc;">Your Desi Wealth Coach</span>
        </div>
        <i class="fa-solid fa-xmark" style="cursor: pointer;" onclick="toggleChat()"></i>
    </div>
    
    <div class="chat-body" id="chatBody">
        <div class="chat-message bot">
            Hello! I am Setu-AI. Ask me if you can afford that new iPhone, or why your budget is bleeding. Seedha baat, no nonsense.
        </div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="chatInput" placeholder="Ask about your finances..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    let chatHistory = [];

    function toggleChat() {
        const chatWin = document.getElementById('chatWindow');
        chatWin.style.display = chatWin.style.display === 'flex' ? 'none' : 'flex';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        // Show a typing indicator
        const typingId = appendMessage('bot', '<i class="fa-solid fa-circle-notch fa-spin"></i> Thinking...');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: chatHistory })
            });
            const data = await response.json();
            
            // Remove typing indicator and append real message
            document.getElementById(typingId).remove();
            appendMessage('bot', data.reply);
            chatHistory = data.history; // Update memory!
            
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage('bot', "Oops, connection error. Try again!");
        }
    }

    function appendMessage(sender, text) {
        const body = document.getElementById('chatBody');
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${sender}`;
        msgDiv.innerHTML = text;
        const id = 'msg-' + Date.now();
        msgDiv.id = id;
        body.appendChild(msgDiv);
        body.scrollTop = body.scrollHeight; // Auto-scroll to bottom
        return id;
    }
</script>

<style>
    /* CHAT WIDGET STYLING */
    .chat-fab {
        position: fixed; bottom: 25px; right: 25px;
        background: #1a2a47; color: white; padding: 12px 20px;
        border-radius: 30px; font-weight: 600; cursor: pointer;
        box-shadow: 0 10px 15px rgba(0,0,0,0.1); z-index: 999;
        display: flex; align-items: center; gap: 8px; transition: 0.2s;
    }
    .chat-fab:hover { background: #3b82f6; transform: translateY(-2px); }
    
    .chat-window {
        position: fixed; bottom: 80px; right: 25px;
        width: 340px; height: 450px; background: white;
        border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        display: none; flex-direction: column; z-index: 1000;
        overflow: hidden; border: 1px solid #e2e8f0;
    }
    
    .chat-header {
        background: #1a2a47; padding: 15px; color: white;
        display: flex; justify-content: space-between; align-items: center;
    }
    
    .chat-body {
        flex-grow: 1; padding: 15px; overflow-y: auto;
        display: flex; flex-direction: column; gap: 10px; background: #f8fafc;
    }
    
    .chat-message {
        padding: 10px 14px; border-radius: 12px; font-size: 13.5px;
        max-width: 85%; line-height: 1.4;
    }
    .chat-message.bot { background: #e0e7ff; color: #1e3a8a; align-self: flex-start; border-bottom-left-radius: 2px;}
    .chat-message.user { background: #1a2a47; color: white; align-self: flex-end; border-bottom-right-radius: 2px;}
    
    .chat-footer {
        display: flex; padding: 10px; border-top: 1px solid #e2e8f0; background: white;
    }
    .chat-footer input {
        flex-grow: 1; border: 1px solid #cbd5e1; border-radius: 20px;
        padding: 8px 15px; outline: none; font-size: 13px;
    }
    .chat-footer button {
        background: none; border: none; color: #3b82f6;
        font-size: 18px; cursor: pointer; padding: 0 10px;
    }
</style>
