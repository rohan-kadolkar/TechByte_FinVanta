<div class="chat-fab" onclick="toggleChat()">
    <i class="fa-solid fa-sparkles"></i> Ask FinVanta
</div>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <div>
            <h4 style="margin: 0; color: white; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-robot"></i> FinVanta AI
            </h4>
            <span style="font-size: 11px; color: #a5b4fc;">Your Desi Wealth Coach</span>
        </div>
        <i class="fa-solid fa-xmark" style="cursor: pointer; font-size: 18px;" onclick="toggleChat()"></i>
    </div>
    
    <div class="chat-body" id="chatBody">
        <div class="chat-message bot">
            Hello! I am FinVanta. Ask me if you can afford that new iPhone, or why your budget is bleeding. Seedha baat, no nonsense.
        </div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="chatInput" placeholder="Message FinVanta..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
    </div>
</div>

<script>
    // 1. Load memory from sessionStorage!
    let chatHistory = JSON.parse(sessionStorage.getItem('finvanta_history')) || [];

    // When the page loads, restore the chat UI and window state
    window.onload = function() {
        const savedDOM = sessionStorage.getItem('finvanta_chat_dom');
        if (savedDOM) {
            document.getElementById('chatBody').innerHTML = savedDOM;
            // Scroll to bottom after loading
            const body = document.getElementById('chatBody');
            body.scrollTop = body.scrollHeight; 
        }
        
        // Keep it open if it was open on the last page
        if (sessionStorage.getItem('finvanta_is_open') === 'true') {
            document.getElementById('chatWindow').style.display = 'flex';
        }
    };

    function toggleChat() {
        const chatWin = document.getElementById('chatWindow');
        const isOpen = chatWin.style.display === 'flex';
        chatWin.style.display = isOpen ? 'none' : 'flex';
        // Save state to memory
        sessionStorage.setItem('finvanta_is_open', !isOpen);
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        const typingId = appendMessage('bot', '<i class="fa-solid fa-circle-notch fa-spin"></i> Thinking...');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: chatHistory })
            });
            const data = await response.json();
            
            document.getElementById(typingId).remove();
            appendMessage('bot', data.reply);
            
            // Update the backend context array
            chatHistory = data.history; 
            
            // 2. SAVE TO MEMORY SO IT SURVIVES PAGE REFRESHES!
            sessionStorage.setItem('finvanta_history', JSON.stringify(chatHistory));
            
        } catch (error) {
            document.getElementById(typingId).remove();
            appendMessage('bot', "Oops, connection error. Try again!");
        }
    }

    function appendMessage(sender, text) {
        const body = document.getElementById('chatBody');
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${sender}`;
        msgDiv.innerHTML = text;
        const id = 'msg-' + Date.now();
        msgDiv.id = id;
        body.appendChild(msgDiv);
        body.scrollTop = body.scrollHeight; 
        
        // Save the visual HTML to memory after every message
        sessionStorage.setItem('finvanta_chat_dom', body.innerHTML);
        
        return id;
    }
</script>
